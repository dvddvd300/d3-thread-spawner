# d3-thread-spawner — Example global config
# Copy to ~/.config/d3ts/config.toml for global defaults,
# or to .d3ts.toml in your repo root for per-project settings.

[general]
model = "opus"                     # opus, sonnet, haiku, or full model ID
mode = "build"                     # build | plan (interaction mode)
access = "full"                    # full | auto-accept | supervised (access level)
effort = "high"                    # low | medium | high | xhigh | max | ultracode | ultrathink
                                   #   (xhigh/ultracode/ultrathink require Opus 4.8;
                                   #    T3 clamps unsupported values to the model default)
base_branch = "main"               # default base branch for worktrees
# repo_dir = "~/my-project"        # explicit repo path (default: CWD)

[batch]
size = 5                           # threads per batch
delay = 0                          # minutes between batches
launch_delay = 0.5                 # seconds between individual launches
initial_wait = 0                   # minutes to wait before first batch

[t3]
# project_id = "your-uuid-here"   # auto-detected from T3 state if empty
# T3 host/port are auto-detected from ~/.t3/userdata/server-runtime.json

[worktree]
dir = "~/d3ts-worktrees/{project}" # {project} = repo directory name

[github]
# repo = "owner/name"             # auto-detected from git remote origin

[conflicts]
strategy = "merge"                 # "merge" (base into branch) or "rebase" (onto base)

[models]
# Define aliases for model IDs. Use these with --model flag.
# Opus 4.8 requires T3 Code's bundled Claude Code CLI >= 2.1.154.
opus = "claude-opus-4-8"
sonnet = "claude-sonnet-4-6"
haiku = "claude-haiku-4-5"

[model_options]
# These are filtered per model — d3 only sends options the chosen model supports:
#   context_window → Opus 4.8/4.7/4.6, Sonnet 4.6   (200k or 1m; "1m" needs a 1M-capable model)
#   thinking       → Haiku 4.5 only
#   fast_mode      → Opus 4.5/4.6 only
context_window = "1m"              # 200k or 1m
thinking = true
fast_mode = false

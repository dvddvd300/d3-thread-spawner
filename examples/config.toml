# d3-thread-spawner — Example global config
# Copy to ~/.config/d3ts/config.toml for global defaults,
# or to .d3ts.toml in your repo root for per-project settings.

[general]
model = "opus"                     # opus, sonnet, haiku, gpt55, or full model ID
mode = "build"                     # build | plan (interaction mode)
access = "full"                    # full | auto-accept | supervised (access level)
effort = "high"                    # low | medium | high | xhigh | max | ultracode | ultrathink
                                   #   (GPT supports xhigh; max/ultracode/ultrathink require Opus 4.8;
                                   #    T3 clamps unsupported values to the model default)
base_branch = "main"               # default base branch for worktrees
# repo_dir = "~/my-project"        # explicit repo path (default: CWD)

[batch]
size = 5                           # threads per batch
delay = 0                          # minutes between batches
launch_delay = 0.5                 # seconds between individual launches
initial_wait = 0                   # minutes to wait before first batch

[t3]
# project_id = "your-uuid-here"   # auto-detected from T3 state if empty
# T3 host/port are auto-detected from ~/.t3/userdata/server-runtime.json

[worktree]
dir = "~/d3ts-worktrees/{project}" # {project} = repo directory name

[github]
# repo = "owner/name"             # auto-detected from git remote origin

[conflicts]
strategy = "merge"                 # "merge" (base into branch) or "rebase" (onto base)
# Safety guard: under "rebase", a head branch matching protected_branches is
# auto-downgraded to merge — force-pushing a shared/long-lived branch rewrites the
# history every dependent PR and clone relies on. Override per run with
# --force-rebase-protected (or set rebase_protected = true here).
protected_branches = ["main", "master", "develop", "dev", "staging", "stage", "production", "prod", "release", "next", "trunk"]
rebase_protected = false

[review]
# prompt_file = "~/my-review-guide.md"  # custom reviewer methodology for the
                                   # `review` command (default: the bundled
                                   # generic senior-reviewer guide)

[models]
# Define aliases for model IDs. Use these with --model flag.
# Provider routing is automatic from the resolved model slug:
#   claude-* -> T3 provider "claudeAgent"
#   gpt-*    -> T3 provider "codex"
# Opus 4.8 requires T3 Code's bundled Claude Code CLI >= 2.1.154.
opus = "claude-opus-4-8"
sonnet = "claude-sonnet-4-6"
haiku = "claude-haiku-4-5"
gpt55 = "gpt-5.5"

[model_options]
# These are filtered per model/provider — d3 only sends options the chosen model supports.
# JSONL tasks may override these per line with service_tier/context_window/thinking/fast_mode.
#   service_tier   → GPT/Codex models that expose Standard/Fast
#   context_window → Claude models that expose 200k/1m
#   thinking       → Haiku 4.5 only
#   fast_mode      → Claude models that expose Fast Mode
# service_tier accepts standard/default or fast/priority.
service_tier = "standard"          # standard/default or fast/priority
context_window = "1m"              # 200k or 1m
thinking = true
fast_mode = false
